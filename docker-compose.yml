version: "3.8"

services:
  backend:
    build: ./backend
    container_name: smeta-backend
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - db_data:/app/data
      - ./backend/logs:/app/logs
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite:///./data/smeta.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: /api
    container_name: smeta-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
